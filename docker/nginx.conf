# 静态 SvelteKit（adapter-static）输出：优先尝试 $uri.html，避免与同名目录（如 en/）冲突
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    # 根路径语言入口：/en 与 en/ 目录并存，需落到 en.html
    location = /en {
        try_files /en.html =404;
    }
    location = /zh {
        try_files /zh.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # 长缓存由构建产物带 hash，可按需再细调
    location /_app/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
